# config/sources.yml — V1 뉴스 소스 시드 (requirements §6-1)
#
# 카테고리 enum: ai_trend / agri_distribution / farmboss_keyword (3개 동결)
# type enum: rss / html / json_api (3개 동결)
# id 정규식: ^[a-z][a-z0-9_]*$ (중복 금지, 한 번 정해진 id 는 deprecated 시에도 재사용 금지 — sent.jsonl source_id 호환성)
# time_window_hours: optional, 미지정 시 filters.yml global.time_window_hours (기본 36) 사용
#
# URL 검증 상태: 본 시드는 공식 RSS 가 알려진 곳 위주. 실제 운영 응답 확인은 step3 fetchers dry-run 에서 진행.
# fetcher 가 소스 단위 실패 격리(AC-5.1)를 적용하므로 일부 URL 이 잘못돼도 phase 가 멈추지 않는다.
#
# 2026-05-20 운영 현황 (18개 중 11개 enabled, 7개 disabled):
#   enabled (11): openai_blog, google_deepmind_blog, huggingface_blog, tldr_ai,
#                 google_blog_ai, google_cloud_ai, google_research, the_verge_ai,  # 2026-05-20 보강
#                 agrinet_news, thinkfood, thinkfood_farmboss
#   disabled (7): anthropic_blog (RSS 404), nongmin_news / nongmin_rural_economy (RSS body 1바이트),
#                 at_kamis (timeout), gs_retail_ir / cheongdo_gov / andong_nh_market (HtmlFetcher V1 stub)
#   상세 사유: 각 항목 위 코멘트 + phases/_hotfix-log/2026-05-20-dead-sources-disable.md
#   보강 사유: phases/_hotfix-log/2026-05-20-sources-keywords-expansion.md (ai_trend 빅테크 누락 보완)

sources:
  # ===== ai_trend (9개) =====
  - id: anthropic_blog
    name: "Anthropic Blog"
    url: "https://www.anthropic.com/news/rss.xml"
    type: rss
    category: ai_trend
    # 2026-05-20 disable — Anthropic 공식 RSS 미제공 확인 (HTTP 404, /rss.xml·/feed.xml·/news/rss 모두 404).
    # 외부 미러(RSSHub 등)는 신뢰도·안정성 의문이라 V1 범위 외. V2 에서 공식 RSS 부활 시 다시 true.
    enabled: false
    tags: ["ai", "model_release", "anthropic"]
    time_window_hours: 36
  - id: openai_blog
    name: "OpenAI Blog"
    # TODO: RSS 경로 운영 확인 필요 — OpenAI 는 공식 RSS 미공개 시점이 있어 step3 dry-run 에서 fallback (HTML) 전환 검토.
    url: "https://openai.com/blog/rss.xml"
    type: rss
    category: ai_trend
    enabled: true
    tags: ["ai", "model_release", "openai"]
  - id: google_deepmind_blog
    name: "Google DeepMind Blog"
    # TODO: RSS 경로 운영 확인 필요 — DeepMind 블로그 RSS feed.
    url: "https://deepmind.google/blog/rss.xml"
    type: rss
    category: ai_trend
    enabled: true
    tags: ["ai", "research", "google"]
  - id: huggingface_blog
    name: "Hugging Face Blog"
    url: "https://huggingface.co/blog/feed.xml"
    type: rss
    category: ai_trend
    enabled: true
    tags: ["ai", "open_source"]
  - id: tldr_ai
    name: "TLDR AI"
    # TODO: RSS 경로 운영 확인 필요 — TLDR AI 뉴스레터 RSS mirror.
    url: "https://tldr.tech/api/rss/ai"
    type: rss
    category: ai_trend
    enabled: true
    tags: ["ai", "newsletter", "digest"]
  - id: google_blog_ai
    name: "Google AI Blog (The Keyword)"
    # 2026-05-20 추가 — Gemini 등 Google 공식 제품 발표 1차 진원지 (The Keyword AI 섹션).
    # google_deepmind_blog 가 연구 톤이라 제품 출시는 늦거나 누락되는 빈틈을 메움.
    # URL 응답·RSS XML 검증 완료 (2026-05-20).
    url: "https://blog.google/technology/ai/rss/"
    type: rss
    category: ai_trend
    enabled: true
    tags: ["ai", "model_release", "google"]
  - id: google_cloud_ai
    name: "Google Cloud AI Blog"
    # 2026-05-20 추가 — Vertex AI 등 엔터프라이즈 AI 발표.
    # 정식 path (cloud.google.com) 는 SPA 라 RSS 미제공 — cloudblog.withgoogle.com 미러 endpoint 가 RSS 제공.
    # URL 응답·RSS XML 검증 완료 (2026-05-20).
    url: "https://cloudblog.withgoogle.com/products/ai-machine-learning/rss/"
    type: rss
    category: ai_trend
    enabled: true
    tags: ["ai", "cloud", "google"]
  - id: google_research
    name: "Google Research Blog"
    # 2026-05-20 추가 — Google Research 연구 발표 (DeepMind 보완 채널).
    # URL 응답·RSS XML 검증 완료 (2026-05-20).
    url: "https://research.google/blog/rss/"
    type: rss
    category: ai_trend
    enabled: true
    tags: ["ai", "research", "google"]
  - id: the_verge_ai
    name: "The Verge AI"
    # 2026-05-20 추가 — 빅테크 출시 24h 내 보도 안전망. Atom feed (feedparser 호환).
    # 빅테크 1차 채널이 RSS 갱신 지연되거나 죽었을 때 백업 역할.
    # URL 응답·Atom XML 검증 완료 (2026-05-20).
    url: "https://www.theverge.com/rss/ai-artificial-intelligence/index.xml"
    type: rss
    category: ai_trend
    enabled: true
    tags: ["ai", "media", "english"]

  # ===== agri_distribution (5개) =====
  - id: nongmin_news
    name: "농민신문"
    # 2026-05-20 disable — RSS 사실상 종료. HTTP 200 응답하지만 body 1바이트만 반환 (browser UA 동일).
    # 같은 카테고리는 한국농어민신문(`agrinet_news`)·식품음료신문(`thinkfood`)으로 흡수 가능.
    # V2 에서 농민신문이 RSS 재개하거나 HTML 어댑터 구현 시 다시 true.
    url: "https://www.nongmin.com/rss/all.xml"
    type: rss
    category: agri_distribution
    enabled: false
    tags: ["agri", "korea"]
  - id: agrinet_news
    name: "한국농어민신문"
    # TODO: RSS 경로 운영 확인 필요 — 한국농어민신문 공식 RSS.
    url: "https://www.agrinet.co.kr/rss/allArticle.xml"
    type: rss
    category: agri_distribution
    enabled: true
    tags: ["agri", "korea"]
  - id: thinkfood
    name: "식품음료신문"
    # TODO: RSS 경로 운영 확인 필요 — 식품·유통 산업 매체.
    url: "https://www.thinkfood.co.kr/rss/allArticle.xml"
    type: rss
    category: agri_distribution
    enabled: true
    tags: ["food", "distribution"]
  - id: at_kamis
    name: "aT KAMIS 보도"
    # 2026-05-20 disable — TCP 응답 없음 (20초+ timeout 재현). 공식 RSS 사실상 미제공.
    # KAMIS 는 Open-API 만 제공하므로 V2 에서 json_api 어댑터 + 가격·동향 endpoint 로 전환 검토.
    url: "https://www.kamis.or.kr/customer/board/board_feed.do?action=rss&boardId=B01"
    type: rss
    category: agri_distribution
    enabled: false
    tags: ["agri", "price", "official"]
  - id: gs_retail_ir
    name: "GS리테일 IR"
    # 2026-05-20 disable — type: html 이지만 HtmlFetcher 가 V1 stub (NotImplementedError raise).
    # 매일 parse_error Failure 1건이 노이즈가 되므로 V2 의 HtmlFetcher (per-source selector) 구현까지 끔.
    # farmboss_keyword 필터에 "GS리테일" 키워드가 있어 다른 매체 기사에서 자동 재배정으로 일부 흡수.
    url: "https://www.gsretail.com/gscvs/ko/ir/news-list"
    type: html
    category: agri_distribution
    enabled: false
    tags: ["retail", "ir", "gs"]

  # ===== farmboss_keyword (4개) =====
  - id: nongmin_rural_economy
    name: "농민신문 농촌경제"
    # 2026-05-20 disable — nongmin_news 와 동일 원인 (RSS 사실상 종료, body 1바이트 응답).
    # farmboss_keyword 키워드는 thinkfood_farmboss·agrinet_news 본문에서 category.py 가 자동 재배정으로 흡수.
    url: "https://www.nongmin.com/rss/section/economy.xml"
    type: rss
    category: farmboss_keyword
    enabled: false
    tags: ["agri", "economy", "korea"]
  - id: thinkfood_farmboss
    name: "식품음료신문 (팜보스 키워드)"
    # 같은 매체에서 농민신문과 별도 등록 — 카테고리 우선순위 분리용(filters/category.py).
    url: "https://www.thinkfood.co.kr/rss/allArticle.xml"
    type: rss
    category: farmboss_keyword
    enabled: true
    tags: ["food", "farmboss"]
  - id: cheongdo_gov
    name: "청도군 보도"
    # 2026-05-20 disable — type: html, HtmlFetcher V1 stub. V2 어댑터 구현 시 다시 true.
    # "청도" 키워드는 다른 매체 기사에서 category.py 가 자동 재배정으로 흡수.
    url: "https://www.cheongdo.go.kr/rss/news.do"
    type: html
    category: farmboss_keyword
    enabled: false
    tags: ["regional", "cheongdo"]
  - id: andong_nh_market
    name: "안동농협공판장"
    # 2026-05-20 disable — type: html, HtmlFetcher V1 stub. V2 어댑터 구현 시 다시 true.
    # "안동농협공판장" 키워드는 농어민/식품매체 기사에서 category.py 가 자동 재배정으로 흡수 가능.
    url: "https://andongnh.nonghyup.com/rss/notice.do"
    type: html
    category: farmboss_keyword
    enabled: false
    tags: ["regional", "andong", "market"]
