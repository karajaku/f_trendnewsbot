# config/sources.yml — V1 뉴스 소스 시드 (requirements §6-1)
#
# 카테고리 enum: ai_trend / agri_distribution / farmboss_keyword (3개 동결)
# type enum: rss / html / json_api (3개 동결)
# id 정규식: ^[a-z][a-z0-9_]*$ (중복 금지, 한 번 정해진 id 는 deprecated 시에도 재사용 금지 — sent.jsonl source_id 호환성)
# time_window_hours: optional, 미지정 시 filters.yml global.time_window_hours (기본 36) 사용
#
# URL 검증 상태: 본 시드는 공식 RSS 가 알려진 곳 위주. 실제 운영 응답 확인은 step3 fetchers dry-run 에서 진행.
# fetcher 가 소스 단위 실패 격리(AC-5.1)를 적용하므로 일부 URL 이 잘못돼도 phase 가 멈추지 않는다.

sources:
  # ===== ai_trend (5개) =====
  - id: anthropic_blog
    name: "Anthropic Blog"
    url: "https://www.anthropic.com/news/rss.xml"
    type: rss
    category: ai_trend
    enabled: true
    tags: ["ai", "model_release", "anthropic"]
    time_window_hours: 36
  - id: openai_blog
    name: "OpenAI Blog"
    # TODO: RSS 경로 운영 확인 필요 — OpenAI 는 공식 RSS 미공개 시점이 있어 step3 dry-run 에서 fallback (HTML) 전환 검토.
    url: "https://openai.com/blog/rss.xml"
    type: rss
    category: ai_trend
    enabled: true
    tags: ["ai", "model_release", "openai"]
  - id: google_deepmind_blog
    name: "Google DeepMind Blog"
    # TODO: RSS 경로 운영 확인 필요 — DeepMind 블로그 RSS feed.
    url: "https://deepmind.google/blog/rss.xml"
    type: rss
    category: ai_trend
    enabled: true
    tags: ["ai", "research", "google"]
  - id: huggingface_blog
    name: "Hugging Face Blog"
    url: "https://huggingface.co/blog/feed.xml"
    type: rss
    category: ai_trend
    enabled: true
    tags: ["ai", "open_source"]
  - id: tldr_ai
    name: "TLDR AI"
    # TODO: RSS 경로 운영 확인 필요 — TLDR AI 뉴스레터 RSS mirror.
    url: "https://tldr.tech/api/rss/ai"
    type: rss
    category: ai_trend
    enabled: true
    tags: ["ai", "newsletter", "digest"]

  # ===== agri_distribution (5개) =====
  - id: nongmin_news
    name: "농민신문"
    # TODO: RSS 경로 운영 확인 필요 — 농민신문 전체 RSS. 섹션별 RSS 가 분리되면 농업·유통 섹션으로 좁힐 것.
    url: "https://www.nongmin.com/rss/all.xml"
    type: rss
    category: agri_distribution
    enabled: true
    tags: ["agri", "korea"]
  - id: agrinet_news
    name: "한국농어민신문"
    # TODO: RSS 경로 운영 확인 필요 — 한국농어민신문 공식 RSS.
    url: "https://www.agrinet.co.kr/rss/allArticle.xml"
    type: rss
    category: agri_distribution
    enabled: true
    tags: ["agri", "korea"]
  - id: thinkfood
    name: "식품음료신문"
    # TODO: RSS 경로 운영 확인 필요 — 식품·유통 산업 매체.
    url: "https://www.thinkfood.co.kr/rss/allArticle.xml"
    type: rss
    category: agri_distribution
    enabled: true
    tags: ["food", "distribution"]
  - id: at_kamis
    name: "aT KAMIS 보도"
    # TODO: RSS 경로 운영 확인 필요 — aT/KAMIS 공식 보도자료 페이지. RSS 미제공 시 HTML 어댑터로 전환.
    url: "https://www.kamis.or.kr/customer/board/board_feed.do?action=rss&boardId=B01"
    type: rss
    category: agri_distribution
    enabled: true
    tags: ["agri", "price", "official"]
  - id: gs_retail_ir
    name: "GS리테일 IR"
    # TODO: RSS 경로 운영 확인 필요 — GS리테일 IR 공시 페이지. RSS 미제공 시 HTML 어댑터로 전환 (step3).
    url: "https://www.gsretail.com/gscvs/ko/ir/news-list"
    type: html
    category: agri_distribution
    enabled: true
    tags: ["retail", "ir", "gs"]

  # ===== farmboss_keyword (4개) =====
  - id: nongmin_rural_economy
    name: "농민신문 농촌경제"
    # TODO: RSS 경로 운영 확인 필요 — 농민신문 농촌경제 섹션 RSS. 미제공 시 전체 RSS + 키워드 필터(filters.yml farmboss_keyword)로 흡수.
    url: "https://www.nongmin.com/rss/section/economy.xml"
    type: rss
    category: farmboss_keyword
    enabled: true
    tags: ["agri", "economy", "korea"]
  - id: thinkfood_farmboss
    name: "식품음료신문 (팜보스 키워드)"
    # 같은 매체에서 농민신문과 별도 등록 — 카테고리 우선순위 분리용(filters/category.py).
    url: "https://www.thinkfood.co.kr/rss/allArticle.xml"
    type: rss
    category: farmboss_keyword
    enabled: true
    tags: ["food", "farmboss"]
  - id: cheongdo_gov
    name: "청도군 보도"
    # TODO: RSS 경로 운영 확인 필요 — 청도군 공식 보도자료. RSS 미제공 시 HTML 어댑터로 전환.
    url: "https://www.cheongdo.go.kr/rss/news.do"
    type: html
    category: farmboss_keyword
    enabled: true
    tags: ["regional", "cheongdo"]
  - id: andong_nh_market
    name: "안동농협공판장"
    # TODO: RSS 경로 운영 확인 필요 — 안동농협공판장 자체 사이트 RSS 가 없을 가능성 큼. 안동농협 일반 공지 페이지 HTML 어댑터로 대체 검토.
    url: "https://andongnh.nonghyup.com/rss/notice.do"
    type: html
    category: farmboss_keyword
    enabled: true
    tags: ["regional", "andong", "market"]
