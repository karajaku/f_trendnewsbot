name: daily digest

# AC-1.1 · 1.4 · 1.5 · 5.6 · 7.1 — cron 발송 + workflow_dispatch + Pages publish 권한.
# CLAUDE.md CRITICAL #7 — cron 식은 UTC. KST 환산 주석은 cron 라인 바로 위.

on:
  schedule:
    # = KST 익일 07:20 매일 (토·일·공휴일 포함, 2026-05-19 사용자 결정).
    # cron 일반적 지연을 흡수해 07:30 ±15분 SLA (AC-1.3).
    - cron: '20 22 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: '운영자 chat 으로만 발송 (직원 단톡방 차단)'
        type: boolean
        default: false

permissions:
  # Pages publish 가 dispatchers/pages_publish.py 에서 `git push origin gh-pages` 호출 (ADR-003).
  contents: write
  # 직전 성공 run 의 digest-history 아티팩트 조회·cross-run 다운로드 (CRITICAL #8 dedup).
  actions: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Secrets (암호화 저장).
      # ADR-004 (2026-05-19): ANTHROPIC_API_KEY → GEMINI_API_KEY swap (Anthropic → Gemini provider).
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      # Variables (평문, 값 노출 OK — chat_id 음수 정수 + URL 등).
      TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}
      OPS_ALERT_CHAT_ID: ${{ vars.OPS_ALERT_CHAT_ID }}
      PAGES_BASE_URL: ${{ vars.PAGES_BASE_URL }}
      GEMINI_MODEL_ID: ${{ vars.GEMINI_MODEL_ID }}
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout master (worktree base)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # default GITHUB_TOKEN 으로 gh-pages branch push 가능 (permissions.contents: write).
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure git bot identity
        # dispatchers/pages_publish.py 가 GIT_AUTHOR_* env 를 강제하지만 worktree 명령에
        # global identity 가 비어 있으면 git 일부 버전이 실패하므로 안전망.
        run: |
          git config --global user.name "f_trendnewsbot"
          git config --global user.email "bot@f_trendnewsbot.local"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Find last successful run id
        # download-artifact@v4 는 run-id 미지정 시 "현재 run" 의 아티팩트만 본다 (v3→v4 변경점).
        # cross-day dedup 을 위해 직전 성공 run 의 id 를 먼저 찾아 다음 스텝에 넘긴다 (CRITICAL #8).
        id: lastrun
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          last=$(gh run list --workflow daily.yml --status success --limit 1 \
                   --json databaseId --jq '.[0].databaseId // ""' 2>/dev/null || echo "")
          echo "id=$last" >> "$GITHUB_OUTPUT"
          echo "last successful run id: ${last:-<none>}"

      - name: Download previous history artifact (best-effort)
        # 직전 성공 run 의 digest-history 를 history/ 로 받아 cross-day dedup 유지.
        # run-id + github-token 은 v4 의 cross-run 다운로드 필수 입력 (미지정 시 현재 run 만 조회).
        # 직전 성공 run 이 없으면(첫 실행) 스텝을 건너뛰어 fresh-start 허용
        # (history/store.py 가 WARNING 후 빈 History).
        if: steps.lastrun.outputs.id != ''
        uses: actions/download-artifact@v4
        with:
          name: digest-history
          path: history/
          run-id: ${{ steps.lastrun.outputs.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Run daily digest
        # 2026-05-20 운영 조치: cron schedule 타이밍 안정화 전까지 schedule 실행도 dry-run
        # 고정 — 운영자 채널(OPS_ALERT_CHAT_ID)로만 발송, 직원 단톡방 차단. 첫 schedule
        # run 이 KST 19:30(저녁)에 발동해 잘못된 시각의 다이제스트가 직원에게 가는 것을 방지.
        # workflow_dispatch 는 기존대로 dry_run 입력을 따른다.
        # 되돌림: cron 발동 시각이 KST 07:20±15 로 안정 확인되면 schedule 분기 제거 →
        # 직원 발송 복귀 (phases/_hotfix-log/2026-05-20-schedule-dry-run-interim.md).
        run: |
          python -m src.run_daily ${{ (github.event_name == 'schedule' || inputs.dry_run) && '--dry-run' || '' }}

      - name: Upload history artifact
        # if: always() — 실패 시에도 다음 실행이 fresh-start 회피하도록 history 보존.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-history
          path: history/sent.jsonl
          retention-days: 90
          overwrite: true
          if-no-files-found: warn
