name: daily digest

# AC-1.1 · 1.4 · 1.5 · 5.6 · 7.1 — cron 발송 + workflow_dispatch + Pages publish 권한.
# CLAUDE.md CRITICAL #7 — cron 식은 UTC. KST 환산 주석은 cron 라인 바로 위.

on:
  schedule:
    # = KST 익일 07:20 매일 (토·일·공휴일 포함, 2026-05-19 사용자 결정).
    # cron 일반적 지연을 흡수해 07:30 ±15분 SLA (AC-1.3).
    - cron: '20 22 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: '운영자 chat 으로만 발송 (직원 단톡방 차단)'
        type: boolean
        default: false

permissions:
  # Pages publish 가 dispatchers/pages_publish.py 에서 `git push origin gh-pages` 호출 (ADR-003).
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Secrets (암호화 저장).
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      # Variables (평문, 값 노출 OK — chat_id 음수 정수 + URL 등).
      TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}
      OPS_ALERT_CHAT_ID: ${{ vars.OPS_ALERT_CHAT_ID }}
      PAGES_BASE_URL: ${{ vars.PAGES_BASE_URL }}
      CLAUDE_MODEL_ID: ${{ vars.CLAUDE_MODEL_ID }}
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout master (worktree base)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # default GITHUB_TOKEN 으로 gh-pages branch push 가능 (permissions.contents: write).
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure git bot identity
        # dispatchers/pages_publish.py 가 GIT_AUTHOR_* env 를 강제하지만 worktree 명령에
        # global identity 가 비어 있으면 git 일부 버전이 실패하므로 안전망.
        run: |
          git config --global user.name "f_trendnewsbot"
          git config --global user.email "bot@f_trendnewsbot.local"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Download previous history artifact (best-effort)
        # 첫 실행 시 artifact 없음 — fresh-start 허용 (history/store.py 가 WARNING 후 빈 History).
        uses: actions/download-artifact@v4
        with:
          name: digest-history
          path: history/
        continue-on-error: true

      - name: Run daily digest
        # --dry-run 은 workflow_dispatch 입력이 true 일 때만 부착.
        run: |
          python -m src.run_daily ${{ inputs.dry_run && '--dry-run' || '' }}

      - name: Upload history artifact
        # if: always() — 실패 시에도 다음 실행이 fresh-start 회피하도록 history 보존.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-history
          path: history/sent.jsonl
          retention-days: 90
          overwrite: true
          if-no-files-found: warn
